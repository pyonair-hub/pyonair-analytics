---
services:
  pyonair-analytics:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://pyonair:pyonair_analytics_2026@db:5432/pyonair_analytics
      APP_SECRET: pyonair-analytics-secret-2026
      DISABLE_TELEMETRY: 1
    depends_on:
      db:
        condition: service_healthy
    init: true
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:3000/api/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pyonair_analytics
      POSTGRES_USER: pyonair
      POSTGRES_PASSWORD: pyonair_analytics_2026
    volumes:
      - pyonair-analytics-db:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pyonair-analytics-db:
